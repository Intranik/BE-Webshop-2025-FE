<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
        <link rel="stylesheet" href="style.css">
        <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
        <script src="./src/scripts/cart.js" type="module" defer></script>
    
        <title>Shopping Cart</title>
    </head>
<body>
    <nav class="navbar bg-white shadow-sm">
        <div class="container d-flex justify-content-center gap-4">
            <div class="me-auto">
                <a class="navbar-brand" href="./index.html">
                    <img src="./HAKIM_Livs_4.png"  alt="Bootstrap" height="50">
                </a>
            </div>
            <div class="d-flex flex-nowrap gap-5">
              <div id="login-button" class="d-flex flex-column justify-content-center align-items-center">
                <a href="#" class="text-dark text-decoration-none d-flex flex-column justify-content-center align-items-center" data-bs-toggle="modal" data-bs-target="#loginModal">
                  <i class="fa-solid fa-user fs-3" style="color: #010768;"></i>
                <p class="mb-0" style="font-size: 0.60rem; font-weight: bold; color: #010768;">Logga in</p>
                </a>
            </div>
              <div id="logout-button" class="d-none d-flex flex-column justify-content-center align-items-center">
                <a href="#" class="text-dark text-decoration-none d-flex flex-column justify-content-center align-items-center">
                  <i class="fa-solid fa-user fs-3" style="color: #010768;"></i>
                <p class="mb-0" style="font-size: 0.60rem; font-weight: bold; color: #010768;">Logga ut</p>
                </a>
              </div>
              <div id="cart-button">
                <a href="./shopping-cart.html" class="text-dark text-decoration-none d-flex flex-column justify-content-center align-items-center">
                  <i class="fa-solid fa-cart-shopping fs-3" style="color: #010768;"></i>
                  <p class="mb-0" style="font-size: 0.60rem; font-weight: bold; color: #010768;">Till kassan</p>
                </a>
              </div>
              <div id="admin-button" class="d-none d-flex flex-column justify-content-center align-items-center">
                <a href="#" class="text-dark text-decoration-none d-flex flex-column justify-content-center align-items-center">
                  <i class="fa-solid fa-user-gear fs-3" style="color: #010768;"></i>
                <p class="text-start mb-0" style="font-size: 0.60rem; font-weight: bold; color: #010768; position: relative; left: -5px;">Admin</p>
                </a>
              </div>
            </div>
        </div>
    </nav>
    <div class="container d-flex justify-content-center mt-5">
        <!-- Cart Items (Left) -->
        <div class="container me-3 p-3 border rounded" style="width: 50%;">
            <h3>Shopping Cart</h3>
            <div id="cart-items"></div>
        </div>

        <!-- Cart Summary (Right) -->
        <div class="container p-3 border rounded" style="width: 30%;">
            <h3>Summary</h3>
            <p><strong>Total Product Price:</strong> <span id="total-product-price">0 SEK</span></p>
            <p><strong>Tax (12% Included):</strong> <span id="tax">0 SEK</span></p>
            <p><strong>Shipping Cost:</strong> <span id="shipping-cost">49 SEK</span></p>
            <hr>
            <p><strong>Total Cost:</strong> <span id="total-cost">0 SEK</span></p>
        </div>
    </div>
</body>
</html>
